<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlcss-pricing-plan</title>

</head>

<body>
    <header>
        <h1>Our Pricing Plan</h1>
        <p>We are an industry-leading company that values honesty, <br>
            integrity and efficiency, building quality products.</p>
        <div class="toggle">
          <span>Monthly</span>
          <input type="checkbox"> <!--elemento per controllo-->
          <span>Yearly</span>
        </div>
    </header>
    <main>      
       <div class="card"> 
        <h2>Basic</h2>
        <p>Most Popular</p>
       <!--metto dentro un div  per modificare in css poi-->
       <div class="prezzo">
        <span class="dollaro">$</span>
        <span class="numeri">2.45</span>
        <span class="periodo">/mo</span>
       </div>
       </div>
       
    </main>
</body>

</html>
